<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
        <style>
            html * { box-sizing:border-box;}
            section {width:100%; max-width:800px; margin:5rem auto;}
            .makebox, .typebox {display:flex; flex-wrap: wrap; margin-bottom:2rem; }
            .makebox img {width:calc((100% - 24px) / 4); margin-left:8px;}
            .typebox img {width:calc((100% - 24px) / 4); margin-left:8px;}
            .makebox img:nth-of-type(4n-3), .typebox img:nth-of-type(4n-3) { margin-left:0;}
        </style>
    </head>
    <body>
        <section>
        <div class="makebox">
            <img src="icon/icon-hino.png">
            <img src="icon/icon-isuzu.png">
            <img src="icon/icon-fuso.png">
            <img src="icon/icon-ud.png">
            <img src="icon/icon-volvo.png">
            <img src="icon/icon-toyota.png">
            <img src="icon/icon-nissan.png">
            <img src="icon/icon-mitsubishi.png">
            <img src="icon/icon-suzuki.png">
        </div>
        <div class="typebox">
            <img src="icon/icon-wing.png">
            <img src="icon/icon-dump.png">
            <img src="icon/icon-van.png">
            <img src="icon/icon-crane.png">
            <img src="icon/icon-head.png">
            <img src="icon/icon-trailer.png">
            <img src="icon/icon-fleazer.png">
            <img src="icon/icon-flat.png">
            <img src="icon/icon-armroll.png">
            <img src="icon/icon-loader.png">
            <img src="icon/icon-packer.png">
            <img src="icon/icon-mixer.png">
            <img src="icon/icon-bus.png">
            <img src="icon/icon-onebox.png">
            <img src="icon/icon-litevan.png">
            <img src="icon/icon-keivan.png">
        </div>
        </section>
    </body>
</html>
